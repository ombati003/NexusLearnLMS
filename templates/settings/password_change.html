{% extends 'base.html' %}
{% block title %}{{ title }} | Learning management system{% endblock title %}
{% load static %}

{% block content %}

<nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Password Change</li>
    </ol>
</nav>

{% include 'snippets/messages.html' %}

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <p class="form-title"><i class="fas fa-lock"></i> Change Password</p>
            <div class="card-body">
                <form action="" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="old_password_id" class="form-label">Old Password</label>
                        <input type="password" name="old_password" id="old_password_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password1_id" class="form-label">New Password</label>
                        <input type="password" name="new_password1" id="new_password1_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password2_id" class="form-label">Confirm New Password</label>
                        <input type="password" name="new_password2" id="new_password2_id" class="form-control" required>
                    </div>
                    <center>
                        <input class="btn btn-primary" type="submit" value="Change Password">
                    </center><br>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
