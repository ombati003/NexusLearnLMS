<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NexusLearn</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f3f3;
    color: #333;
  }
  /* Container with sidebar + main */
  .container {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: white;
    padding: 20px;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
  }

  /* Logo and role */
  .logo {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .role {
    font-size: 12px;
    color: #777;
    background: #aaa;
    padding: 2px 6px;
    border-radius: 4px;
    width: fit-content;
    margin-bottom: 20px;
  }

  /* Nav menu */
  nav ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
    flex-grow: 1;
  }
  nav ul li {
    margin-bottom: 12px;
  }
  nav ul li a {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: #555;
    font-size: 15px;
    padding: 8px 14px;
    border-radius: 9999px; /* pill shape */
    transition: background-color 0.3s, color 0.3s;
  }
  nav ul li a.active,
  nav ul li a:hover {
    background-color: #0069ff;
    color: white;
  }

  /* Icons (using Unicode symbols + CSS) */
  .icon {
    display: inline-flex;
    width: 20px;
    justify-content: center;
    margin-right: 12px;
    font-size: 18px;
    color: inherit;
  }

  /* Specific icons by content */
  .icon-home::before { content: "\2302"; } /* house */
  .icon-profile::before { content: "\1F464"; } /* bust in silhouette */
  .icon-courses::before { content: "\1F4D6"; } /* book */
  .icon-programs::before { content: "\1F4DA"; } /* books */
  .icon-start-session::before { content: "\25B6"; } /* play button */
  .icon-join-session::before { content: "\25B7"; } /* right triangle */
  .icon-exams::before { content: "\2713"; } /* check mark */
  .icon-score::before { content: "\1F4C8"; } /* chart increasing */
  .icon-others::before { content: "\2192"; } /* right arrow */
  .icon-settings::before { content: "\2699"; } /* gear */

  /* Scroll for sidebar if needed */
  .sidebar nav {
    overflow-y: auto;
  }

  /* Main content */
  main {
    flex-grow: 1;
    padding: 30px 40px;
    background-color: #f7f7f7;
  }

  /* Breadcrumb */
  .breadcrumb {
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
  }

  /* Heading */
  main h2 {
    font-weight: 700;
    font-size: 24px;
    margin-top: 0;
  }

  /* Subheading */
  main h3 {
    font-weight: 700;
    font-size: 20px;
    margin-top: 10px;
    margin-bottom: 15px;
  }

  /* Info text with folder icon */
  .info {
    font-size: 16px;
    color: #777;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 50px;
  }
  .folder-icon {
    font-size: 22px;
  }
  .legend {
    margin-top: 30px;
    font-size: 14px;
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    max-width: 500px;
  }
  .legend span {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: #555;
  }
  .legend .news {
    width: 12px;
    height: 12px;
    background: #0069ff;
    display: inline-block;
    border-radius: 3px;
  }
  .legend .events {
    width: 12px;
    height: 12px;
    background: purple;
    display: inline-block;
    border-radius: 3px;
  }
</style>
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <div class="logo">NexusLearn</div>
    <div class="role">Lecturer</div>
    <nav>
      <ul>
        <li><a href="#" class="active"><span class="icon icon-home"></span>Home</a></li>
        <li><a href="#"><span class="icon icon-profile"></span>Profile</a></li>
        <li><a href="#"><span class="icon icon-courses"></span>My Courses</a></li>
        <li><a href="#"><span class="icon icon-programs"></span>Programs & Courses</a></li>
        <li><a href="#"><span class="icon icon-start-session"></span>Start Live Session</a></li>
        <li><a href="#"><span class="icon icon-join-session"></span>Join session</a></li>
        <li><a href="#"><span class="icon icon-exams"></span>Complete Exams</a></li>
        <li><a href="#"><span class="icon icon-score"></span>Manage Score</a></li>
        <li><a href="#"><span class="icon icon-others"></span>→ Others</a></li>
        <li><a href="#"><span class="icon icon-settings"></span>Account Setting</a></li>
      </ul>
    </nav>
  </aside>
  
  <main>
    <div class="breadcrumb">Home</div>
    <h2>News &amp; <span style="background: #dbe3ff; padding: 0 5px;">Events</span></h2>
    
    <div class="legend">
      <span><span class="news"></span> News</span>
      <span><span class="events"></span> Events</span>
    </div>
    
    <div class="info">
      <span class="folder-icon">&#128193;</span>
      <span>School news and events will appear here.</span>
    </div>
  </main>
</div>

</body>
</html>
