{% extends 'base.html' %}
{% block title %}{{ title }} | Learning management system{% endblock title %}
{% load static %}

{% block content %}

<nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'programs' %}">Programs</a></li>
        <li class="breadcrumb-item active" aria-current="page">Program Form</li>
    </ol>
</nav>

{% include 'snippets/messages.html' %}

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <p class="form-title">Program Add Form</p>
            <div class="p-3"><br>
                <form action="" method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="title_id" class="form-label">Title</label>
                        <input type="text" name="title" id="title_id" class="form-control"
                               value="{{ program.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="summary_id" class="form-label">Summary</label>
                        <textarea name="summary" id="summary_id" class="form-control" rows="4" required>{{ program.summary }}</textarea>
                    </div>

                    <input class="btn btn-primary" type="submit" value="Save">
                    <a class="btn btn-secondary" href="{% url 'programs' %}" style="float: right;">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
