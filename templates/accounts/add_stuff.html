{% extends 'base.html' %}
{% block title %}{{ title }} | Learning management system{% endblock title %}
{% load static %}

{% block content %}

<nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/">Home</a></li>
      <li class="breadcrumb-item"><a href="{% url 'lecturer_list' %}">Lecturers</a></li>
      <li class="breadcrumb-item active" aria-current="page">Add</li>
    </ol>
</nav>

<h4 class="fw-bold mb-3"><i class="fas fa-chalkboard-teacher me-2"></i> Lecturer Add Form</h4>

{% include 'snippets/messages.html' %}

<form action="" method="POST">
    {% csrf_token %}
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="card">
                <p class="form-title">Personal Info</p>
                <div class="p-2">
                    <div class="mb-3">
                        <label for="first_name_id" class="form-label">First Name</label>
                        <input type="text" name="first_name" id="first_name_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="last_name_id" class="form-label">Last Name</label>
                        <input type="text" name="last_name" id="last_name_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="email_id" class="form-label">Email</label>
                        <input type="email" name="email" id="email_id" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="address_id" class="form-label">Address</label>
                        <input type="text" name="address" id="address_id" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="phone_id" class="form-label">Phone</label>
                        <input type="text" name="phone" id="phone_id" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="gender_id" class="form-label">Gender</label>
                        <select name="gender" id="gender_id" class="form-select" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <input class="btn btn-primary" type="submit" value="Save">
</form>

{% endblock content %}
